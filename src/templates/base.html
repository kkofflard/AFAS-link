<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AFAS-link{% endblock %} – AFAS–Entra ID Koppeling</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navigatiebalk -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-arrow-left-right me-2"></i>AFAS-link
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.url.path.startswith('/medewerkers') %}active{% endif %}" href="/medewerkers">
                        <i class="bi bi-people me-1"></i>Medewerkers
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.url.path.startswith('/logs') %}active{% endif %}" href="/logs">
                        <i class="bi bi-journal-text me-1"></i>Synchronisatielogs
                    </a>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-2">
                <span id="sync-indicator" class="badge bg-secondary">
                    <i class="bi bi-circle-fill me-1" style="font-size:0.6rem;"></i>Inactief
                </span>
                <button class="btn btn-outline-light btn-sm" onclick="triggerSync()">
                    <i class="bi bi-arrow-repeat me-1"></i>Nu synchroniseren
                </button>
            </div>
        </div>
    </div>
</nav>

<!-- Toastmelding voor sync-feedback -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999">
    <div id="syncToast" class="toast align-items-center text-bg-success border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="syncToastBody">Synchronisatie gestart.</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<div class="container-fluid py-4">
    {% block content %}{% endblock %}
</div>

<footer class="text-center text-muted py-3 mt-4 border-top bg-white">
    <small>AFAS-link &copy; 2024 &mdash; AFAS–Microsoft Entra ID Koppeling</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
